<!DOCTYPE html>
<html>
<head>

<title>Clinic Bill</title>

<style>

body{font-family:Arial;background:#f4f4f4;text-align:center;margin-top:80px}

table{
margin:auto;
border-collapse:collapse;
width:60%;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#0077b6;
color:white;
}

</style>

</head>

<body>

<h1>Madhav Clinic</h1>
<h3>Patient Diagnosis Report</h3>

<table>

<tr>
<th>Name</th>
<th>Age</th>
<th>Symptom 1</th>
<th>Symptom 2</th>
<th>Disease</th>
</tr>

<tr>
<td id="name"></td>
<td id="age"></td>
<td id="s1"></td>
<td id="s2"></td>
<td id="disease"></td>
</tr>

</table>

<script>

let params=new URLSearchParams(window.location.search)

document.getElementById("name").innerText=params.get("name")
document.getElementById("age").innerText=params.get("age")
document.getElementById("s1").innerText=params.get("s1")
document.getElementById("s2").innerText=params.get("s2")
document.getElementById("disease").innerText=params.get("disease")

</script>

</body>
</html>
